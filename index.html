<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Pronunciation Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎧 English Pronunciation Practice</h1>

  <div class="stars-box">
    ⭐ Stars: <span id="stars">0</span>
  </div>

  <div class="word-list" id="wordList"></div>

  <div class="practice-box">
    <h2 id="selectedWord">Select a word</h2>

    <button id="listenBtn">🔊 Listen</button>

    <div class="record-section">
      <button id="recordBtn">🎤 Start Recording</button>
      <button id="stopBtn" disabled>⏹ Stop</button>
    </div>

    <audio id="audioPlayback" controls></audio>

    <button id="successBtn">⭐ I Did It!</button>
  </div>

</div>

<script>
const words = [
  "the","join","jump","who","are","think","thought",
  "about","are","refuse","use","she","chat","accept",
  "language","umbrella","quick","what","where","three",
  "speak","sign","location","bathroom","today",
  "wednesday","thursday","watch","rarely","usually",
  "generally","currently","university","choose","country"
];

const wordList = document.getElementById("wordList");
const selectedWord = document.getElementById("selectedWord");
const starsElement = document.getElementById("stars");

let currentWord = "";
let mediaRecorder;
let audioChunks = [];

let stars = localStorage.getItem("stars")
  ? parseInt(localStorage.getItem("stars"))
  : 0;

starsElement.innerText = stars;

words.forEach(word => {
  const btn = document.createElement("button");
  btn.className = "word-btn";
  btn.innerText = word;

  btn.onclick = () => {
    currentWord = word;
    selectedWord.innerText = word;
  };

  wordList.appendChild(btn);
});

document.getElementById("listenBtn").onclick = () => {
  if (!currentWord) return alert("Please select a word.");

  const utterance = new SpeechSynthesisUtterance(currentWord);
  utterance.lang = "en-US";
  utterance.rate = 0.8;

  speechSynthesis.speak(utterance);
};

document.getElementById("recordBtn").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = event => {
    audioChunks.push(event.data);
  };

  mediaRecorder.onstop = () => {
    const audioBlob = new Blob(audioChunks);
    const audioUrl = URL.createObjectURL(audioBlob);

    document.getElementById("audioPlayback").src = audioUrl;
  };

  mediaRecorder.start();

  document.getElementById("recordBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;
};

document.getElementById("stopBtn").onclick = () => {
  mediaRecorder.stop();

  document.getElementById("recordBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
};

document.getElementById("successBtn").onclick = () => {
  stars++;
  localStorage.setItem("stars", stars);
  starsElement.innerText = stars;

  alert("Great job! ⭐");
};
</script>

</body>
</html>
